<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky watch</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <!--header-->
    <header>
        <h1>Wellcome to Sky Watch</h1>
    </header>

   <!--main content-->
<div class="box">
    <!--searchh here and with the help of API-->
    <div class="search-box">
        <input type="text" id="city-input">
        <button id="search-button">Search</button>

        <h2>weather in Dubai</h2>
        <!--degrees display here -->
        <div class="weather-info">
            <img src="https://openweathermap.org/img/wn/01d.png" alt="Weather Icon" class="weather-icon">
            <div class="temperature">30°C</div>
            <div class="description">Sunny</div>
            <div class="humidity">Humidity: 40%</div>
            <div class="wind-speed">Wind Speed: 10 km/h</div>
    </div>

</div>


   <!--footer-->
